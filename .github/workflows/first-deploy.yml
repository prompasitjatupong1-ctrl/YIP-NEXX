name: Deploy Pre-built Blazor to IIS

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy-only:
    runs-on: self-hosted 

    steps:
      - name: 📥 1. โหลดไฟล์ล่าสุดที่ทีม Dev อัปโหลดขึ้น GitHub
        uses: actions/checkout@v4

      - name: 🚀 2. นำไฟล์ไปวางลง IIS
        run: |
          # 🛑 1. เปลี่ยนตรงนี้เป็นชื่อโฟลเดอร์ที่ทีม Dev เอาไฟล์ Publish มาวางไว้ใน GitHub
          $SourceFolder = ".\publish_files\*" 
          
          # 🛑 2. เปลี่ยนตรงนี้เป็นโฟลเดอร์ปลายทางของ IIS
          $TargetFolder = "D:\YIPLite\test_github" 
          
          # 🛑 3. เปลี่ยนตรงนี้เป็นชื่อ App Pool ของเว็บ
          $AppPoolName = "DefaultAppPool"

          Write-Host "1. Stopping IIS App Pool: $AppPoolName..."
          Import-Module WebAdministration
          Stop-WebAppPool -Name $AppPoolName
          Start-Sleep -Seconds 2 # รอ 2 วินาทีให้เว็บหยุดสนิทเพื่อไม่ให้ไฟล์ล็อค

          Write-Host "2. Copying new version files to: $TargetFolder..."
          # ก๊อปปี้ไฟล์จากโฟลเดอร์ต้นทาง ไปทับไฟล์เดิมใน IIS
          Copy-Item -Path $SourceFolder -Destination $TargetFolder -Recurse -Force

          Write-Host "3. Starting IIS App Pool: $AppPoolName..."
          Start-WebAppPool -Name $AppPoolName

          Write-Host "🎉 Deployment Completed Successfully!"
