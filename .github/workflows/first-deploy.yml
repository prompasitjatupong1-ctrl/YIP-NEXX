name: Test Local CD

on:
  push:
    branches: [ "main", "master" ]

jobs:
  test-connection:
    runs-on: self-hosted 

    steps:
      - name: 📥 Download Code
        uses: actions/checkout@v4

      - name: 👋 Test Runner Commands
        run: |
          echo "Hello from GitHub Actions!"
          echo "Currently running on machine:"
          hostname
          echo "Current working directory is:"
          pwd
