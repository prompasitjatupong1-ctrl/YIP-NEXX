name: Deploy API and Web to IIS

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy-all:
    runs-on: self-hosted 

    steps:
      - name: 📥 1. Download Code
        uses: actions/checkout@v4

      - name: 🚀 2. Deploy to IIS (API & Web)
        run: |
          Import-Module WebAdministration

          # ==========================================
          # ⚙️ ส่วนที่ 1: ตั้งค่าตัวแปรสำหรับฝั่ง API
          # ==========================================
          $ApiSourceFolder = ".\publish_files\YIPLiteAPISolution\*"
          $ApiTargetFolder = "D:\YIPLite\YIPLiteAPISolution" # 🛑 เปลี่ยนเป็นโฟลเดอร์ IIS ของ API
          $ApiAppPoolName = "YIPLiteAPIPool"                     # 🛑 เปลี่ยนเป็นชื่อ App Pool ของ API

          # ==========================================
          # ⚙️ ส่วนที่ 2: ตั้งค่าตัวแปรสำหรับฝั่ง WEB
          # ==========================================
          $WebSourceFolder = ".\publish_files\YIPLiteWebSolution\*"
          $WebTargetFolder = "D:\YIPLite\YIPLiteWebSolution" # 🛑 เปลี่ยนเป็นโฟลเดอร์ IIS ของ Web
          $WebAppPoolName = "YIPLiteWebPool"                     # 🛑 เปลี่ยนเป็นชื่อ App Pool ของ Web

          # ------------------------------------------
          # 📦 เริ่มกระบวนการ Deploy API
          # ------------------------------------------
          Write-Host "--- 1. Deploying API ---"
          Write-Host "Stopping API App Pool: $ApiAppPoolName..."
          Stop-WebAppPool -Name $ApiAppPoolName
          Start-Sleep -Seconds 2

          Write-Host "Copying API files to: $ApiTargetFolder..."
          Copy-Item -Path $ApiSourceFolder -Destination $ApiTargetFolder -Recurse -Force

          Write-Host "Starting API App Pool: $ApiAppPoolName..."
          Start-WebAppPool -Name $ApiAppPoolName
          Write-Host "API Deployment Done!"
          Write-Host " "

          # ------------------------------------------
          # 📦 เริ่มกระบวนการ Deploy WEB
          # ------------------------------------------
          Write-Host "--- 2. Deploying WEB ---"
          Write-Host "Stopping WEB App Pool: $WebAppPoolName..."
          Stop-WebAppPool -Name $WebAppPoolName
          Start-Sleep -Seconds 2

          Write-Host "Copying WEB files to: $WebTargetFolder..."
          Copy-Item -Path $WebSourceFolder -Destination $WebTargetFolder -Recurse -Force

          Write-Host "Starting WEB App Pool: $WebAppPoolName..."
          Start-WebAppPool -Name $WebAppPoolName
          Write-Host "WEB Deployment Done!"

          Write-Host "🎉 Both API and WEB updated successfully!"
